name: Desktop Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: desktop-release-${{ github.sha }}
  cancel-in-progress: false

jobs:
  check-version:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check desktop version
        id: check
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./apps/desktop/package.json').version")
          TAG="desktop-v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if git ls-remote --tags origin | awk '{print $2}' | grep -Fxq "refs/tags/$TAG"; then
            echo "Tag $TAG already exists, skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New desktop version $VERSION detected"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  validate-release:
    needs: check-version
    if: github.ref == 'refs/heads/main' && needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Typecheck
        run: pnpm typecheck

      - name: Core tests
        run: pnpm --filter @skiller/core test

      - name: Desktop tests
        run: pnpm --filter @skiller/desktop test

      - name: E2E tests
        run: pnpm test:e2e

      - name: Build
        run: pnpm build

  build-macos:
    needs: [check-version, validate-release]
    if: github.ref == 'refs/heads/main' && needs.check-version.outputs.should_release == 'true'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate signing secrets
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name secret is required for desktop release signing and notarization."
              exit 1
            fi
          done

      - name: Import code signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$CSC_LINK" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          rm certificate.p12

      - name: Build desktop app
        run: pnpm --dir apps/desktop run build

      - name: Package macOS app
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          pnpm --dir apps/desktop exec electron-builder --config electron-builder.yml --publish never --mac dmg zip --${{ matrix.arch }}

      - name: Notarize and rebuild artifacts
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          cd apps/desktop/release

          APP_PATH=$(find . -name "Skiller.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No Skiller.app bundle found in release directory."
            find . -maxdepth 3 -print
            exit 1
          fi

          ZIP_PATH="notarize-Skiller-${{ matrix.arch }}.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 30m

          xcrun stapler staple "$APP_PATH"
          rm "$ZIP_PATH"

          DIST_ZIP="Skiller-Desktop-${{ matrix.arch }}.zip"
          rm -f "$DIST_ZIP"
          ditto -c -k --keepParent "$APP_PATH" "$DIST_ZIP"

          DIST_DMG="Skiller-Desktop-${{ matrix.arch }}.dmg"
          rm -f "$DIST_DMG"

          STAGING_DIR=$(mktemp -d)
          cp -R "$APP_PATH" "$STAGING_DIR/"
          ln -s /Applications "$STAGING_DIR/Applications"
          hdiutil create "$DIST_DMG" \
            -volname "Skiller" \
            -srcfolder "$STAGING_DIR" \
            -format UDZO \
            -fs HFS+
          rm -rf "$STAGING_DIR"

          VERSION=$(node -p "require('../package.json').version")
          export VERSION
          node <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");

          const arch = process.env.ARCH;
          const version = process.env.VERSION;
          const zipName = `Skiller-Desktop-${arch}.zip`;
          const zipBuffer = fs.readFileSync(zipName);
          const sha512 = crypto.createHash("sha512").update(zipBuffer).digest("base64");
          const metadata = [
            `version: ${version}`,
            "files:",
            `  - url: ${zipName}`,
            `    sha512: ${sha512}`,
            `    size: ${zipBuffer.length}`,
            `path: ${zipName}`,
            `sha512: ${sha512}`,
            `releaseDate: ${new Date().toISOString()}`,
            ""
          ].join("\n");

          fs.writeFileSync(`latest-mac-${arch}.yml`, metadata);
          NODE

          spctl -a -v "$APP_PATH" 2>&1

      - name: Verify artifacts
        run: |
          set -euo pipefail
          test -f "apps/desktop/release/Skiller-Desktop-${{ matrix.arch }}.dmg"
          test -f "apps/desktop/release/Skiller-Desktop-${{ matrix.arch }}.zip"
          test -f "apps/desktop/release/latest-mac-${{ matrix.arch }}.yml"
          ls -la apps/desktop/release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skiller-desktop-${{ matrix.arch }}
          path: |
            apps/desktop/release/Skiller-Desktop-${{ matrix.arch }}.dmg
            apps/desktop/release/Skiller-Desktop-${{ matrix.arch }}.zip
            apps/desktop/release/latest-mac-${{ matrix.arch }}.yml
          if-no-files-found: error

  build-linux:
    needs: [check-version, validate-release]
    if: github.ref == 'refs/heads/main' && needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app
        run: pnpm --dir apps/desktop run build

      - name: Package Linux app
        run: pnpm --dir apps/desktop exec electron-builder --config electron-builder.yml --publish never --linux AppImage deb --${{ matrix.arch }}

      - name: Verify artifacts
        id: linux-artifacts
        run: |
          set -euo pipefail
          if [ "${{ matrix.arch }}" = "x64" ]; then
            APPIMAGE_ARCH="x86_64"
            DEB_ARCH="amd64"
            UPDATE_METADATA="latest-linux.yml"
          else
            APPIMAGE_ARCH="arm64"
            DEB_ARCH="arm64"
            UPDATE_METADATA="latest-linux-arm64.yml"
          fi
          echo "appimage_arch=$APPIMAGE_ARCH" >> "$GITHUB_OUTPUT"
          echo "deb_arch=$DEB_ARCH" >> "$GITHUB_OUTPUT"
          echo "update_metadata=$UPDATE_METADATA" >> "$GITHUB_OUTPUT"
          test -f "apps/desktop/release/Skiller-Desktop-$APPIMAGE_ARCH.AppImage"
          test -f "apps/desktop/release/Skiller-Desktop-$DEB_ARCH.deb"
          test -f "apps/desktop/release/$UPDATE_METADATA"
          ls -la apps/desktop/release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skiller-desktop-linux-${{ matrix.arch }}
          path: |
            apps/desktop/release/Skiller-Desktop-${{ steps.linux-artifacts.outputs.appimage_arch }}.AppImage
            apps/desktop/release/Skiller-Desktop-${{ steps.linux-artifacts.outputs.deb_arch }}.deb
            apps/desktop/release/${{ steps.linux-artifacts.outputs.update_metadata }}
          if-no-files-found: error

  create-release:
    needs: [check-version, build-macos, build-linux]
    if: github.ref == 'refs/heads/main' && needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Extract release notes
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");

          const version = process.env.VERSION;
          const changelog = fs.readFileSync("CHANGELOG.md", "utf8");
          const escapeRegex = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const headingPattern = new RegExp(`^##\\s+Skiller Desktop v${escapeRegex(version)}(?:\\s+-\\s+.*)?$`, "m");
          const match = changelog.match(headingPattern);

          if (!match || match.index === undefined) {
            throw new Error(`Missing changelog entry for Skiller Desktop v${version}`);
          }

          const start = match.index;
          const bodyStart = start + match[0].length;
          const nextHeadingOffset = changelog.slice(bodyStart).search(/\n##\s+/);
          const end = nextHeadingOffset === -1 ? changelog.length : bodyStart + nextHeadingOffset;
          const notes = changelog.slice(start, end).trim();

          if (!notes.includes("\n")) {
            throw new Error(`Changelog entry for Skiller Desktop v${version} is empty`);
          }

          fs.writeFileSync("release-notes.md", `${notes}\n`);
          NODE

      - name: Validate app update metadata
        run: |
          set -euo pipefail
          node <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");
          const path = require("node:path");

          const releaseDir = "release-artifacts";
          const version = require("./apps/desktop/package.json").version;
          const yaml = (() => {
            try {
              return require("js-yaml");
            } catch {
              return null;
            }
          })();

          function sha512(file) {
            return crypto.createHash("sha512").update(fs.readFileSync(file)).digest("base64");
          }

          function size(file) {
            return fs.statSync(file).size;
          }

          function assertFile(file) {
            if (!fs.existsSync(file)) {
              throw new Error(`Missing release artifact: ${file}`);
            }
          }

          function parseScalar(value) {
            const trimmed = value.trim();
            if (/^\d+$/.test(trimmed)) {
              return Number(trimmed);
            }
            return trimmed.replace(/^['"]|['"]$/g, "");
          }

          function parseUpdaterMetadata(content) {
            if (yaml) {
              return yaml.load(content);
            }

            const result = {};
            const lines = content.split(/\r?\n/);
            for (let index = 0; index < lines.length; index += 1) {
              const line = lines[index];
              if (line.trim() === "") {
                continue;
              }

              const topLevel = line.match(/^([A-Za-z0-9_-]+):(?:\s*(.*))?$/);
              if (!topLevel) {
                throw new Error(`Unsupported updater metadata line: ${line}`);
              }

              const [, key, rawValue = ""] = topLevel;
              if (key !== "files") {
                result[key] = parseScalar(rawValue);
                continue;
              }

              const files = [];
              index += 1;
              while (index < lines.length) {
                const itemLine = lines[index];
                if (itemLine.trim() === "") {
                  index += 1;
                  continue;
                }
                if (!itemLine.startsWith("  - ")) {
                  index -= 1;
                  break;
                }

                const firstField = itemLine.match(/^  - ([A-Za-z0-9_-]+):\s*(.*)$/);
                if (!firstField) {
                  throw new Error(`Unsupported updater metadata file entry: ${itemLine}`);
                }

                const file = { [firstField[1]]: parseScalar(firstField[2]) };
                index += 1;
                while (index < lines.length) {
                  const fieldLine = lines[index];
                  if (fieldLine.trim() === "") {
                    index += 1;
                    continue;
                  }
                  if (!fieldLine.startsWith("    ")) {
                    index -= 1;
                    break;
                  }

                  const field = fieldLine.match(/^    ([A-Za-z0-9_-]+):\s*(.*)$/);
                  if (!field) {
                    throw new Error(`Unsupported updater metadata file field: ${fieldLine}`);
                  }
                  file[field[1]] = parseScalar(field[2]);
                  index += 1;
                }
                files.push(file);
                index += 1;
              }
              result.files = files;
            }
            return result;
          }

          function readMetadata(file) {
            const content = fs.readFileSync(file, "utf8");
            const metadata = parseUpdaterMetadata(content);
            if (metadata == null || typeof metadata !== "object" || Array.isArray(metadata)) {
              throw new Error(`${file} did not parse to an updater metadata object`);
            }
            return metadata;
          }

          function validateMetadata(metadataFile, expectedFiles, expectedPath) {
            const metadata = readMetadata(metadataFile);
            if (metadata.version !== version) {
              throw new Error(`${metadataFile} version ${metadata.version} does not match ${version}`);
            }
            if (!Array.isArray(metadata.files)) {
              throw new Error(`${metadataFile} files must be an array`);
            }
            if (metadata.files.length !== expectedFiles.length) {
              throw new Error(`${metadataFile} has ${metadata.files.length} file entries, expected ${expectedFiles.length}`);
            }
            if (metadata.path !== expectedPath) {
              throw new Error(`${metadataFile} path ${metadata.path} does not match ${expectedPath}`);
            }

            for (const expected of expectedFiles) {
              const artifact = path.join(releaseDir, expected);
              assertFile(artifact);
              const entry = metadata.files.find((file) => file && file.url === expected);
              if (!entry) {
                throw new Error(`${metadataFile} does not contain files[].url ${expected}`);
              }
              const expectedSha512 = sha512(artifact);
              const expectedSize = size(artifact);
              if (entry.sha512 !== expectedSha512) {
                throw new Error(`${metadataFile} files[].sha512 for ${expected} does not match the artifact`);
              }
              if (entry.size !== expectedSize) {
                throw new Error(`${metadataFile} files[].size for ${expected} is ${entry.size}, expected ${expectedSize}`);
              }
            }

            const pathEntry = metadata.files.find((file) => file && file.url === metadata.path);
            if (!pathEntry) {
              throw new Error(`${metadataFile} path ${metadata.path} is not present in files[]`);
            }
            if (metadata.sha512 !== pathEntry.sha512) {
              throw new Error(`${metadataFile} top-level sha512 does not match the path entry`);
            }
          }

          function macEntry(arch) {
            const zipName = `Skiller-Desktop-${arch}.zip`;
            const zipPath = path.join(releaseDir, zipName);
            assertFile(zipPath);
            return {
              url: zipName,
              sha512: sha512(zipPath),
              size: size(zipPath)
            };
          }

          for (const file of [
            "Skiller-Desktop-arm64.dmg",
            "Skiller-Desktop-arm64.zip",
            "Skiller-Desktop-x64.dmg",
            "Skiller-Desktop-x64.zip",
            "Skiller-Desktop-arm64.AppImage",
            "Skiller-Desktop-arm64.deb",
            "Skiller-Desktop-x86_64.AppImage",
            "Skiller-Desktop-amd64.deb",
            "latest-mac-arm64.yml",
            "latest-mac-x64.yml",
            "latest-linux.yml",
            "latest-linux-arm64.yml"
          ]) {
            assertFile(path.join(releaseDir, file));
          }

          const macEntries = [macEntry("arm64"), macEntry("x64")];
          const macMetadata = [
            `version: ${version}`,
            "files:",
            ...macEntries.flatMap((entry) => [
              `  - url: ${entry.url}`,
              `    sha512: ${entry.sha512}`,
              `    size: ${entry.size}`
            ]),
            `path: ${macEntries[0].url}`,
            `sha512: ${macEntries[0].sha512}`,
            `releaseDate: ${new Date().toISOString()}`,
            ""
          ].join("\n");

          fs.writeFileSync(path.join(releaseDir, "latest-mac.yml"), macMetadata);
          fs.unlinkSync(path.join(releaseDir, "latest-mac-arm64.yml"));
          fs.unlinkSync(path.join(releaseDir, "latest-mac-x64.yml"));

          validateMetadata(path.join(releaseDir, "latest-mac.yml"), [
            "Skiller-Desktop-arm64.zip",
            "Skiller-Desktop-x64.zip"
          ], "Skiller-Desktop-arm64.zip");
          validateMetadata(path.join(releaseDir, "latest-linux.yml"), [
            "Skiller-Desktop-x86_64.AppImage",
            "Skiller-Desktop-amd64.deb"
          ], "Skiller-Desktop-x86_64.AppImage");
          validateMetadata(path.join(releaseDir, "latest-linux-arm64.yml"), [
            "Skiller-Desktop-arm64.AppImage",
            "Skiller-Desktop-arm64.deb"
          ], "Skiller-Desktop-arm64.AppImage");

          const publishedMetadata = fs.readdirSync(releaseDir).filter((file) => file.startsWith("latest-") && file.endsWith(".yml")).sort();
          const expectedMetadata = ["latest-linux-arm64.yml", "latest-linux.yml", "latest-mac.yml"];
          if (JSON.stringify(publishedMetadata) !== JSON.stringify(expectedMetadata)) {
            throw new Error(`Unexpected update metadata files: ${publishedMetadata.join(", ")}`);
          }
          NODE
          ls -la release-artifacts

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          set -euo pipefail
          TAG="desktop-v$VERSION"
          gh release create "$TAG" release-artifacts/* \
            --target "$GITHUB_SHA" \
            --title "Skiller Desktop v$VERSION" \
            --notes-file release-notes.md
